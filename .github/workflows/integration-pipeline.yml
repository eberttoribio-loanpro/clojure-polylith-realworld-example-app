name: Integration Pipeline

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false

env:
  ARTIFACT_BUCKET: realworld-polylith-artifacts
  REPO_NAME: clojure-polylith-realworld-example-app

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Test
  # ─────────────────────────────────────────────────────────────
  early-test:
    runs-on: ubuntu-latest
    name: Early Test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn', 'projects/*/deps.edn') }}

      - name: Run tests
        run: clojure -M:test

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Detect affected projects + Build
  # ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [early-test]
    outputs:
      affected-projects: ${{ steps.detect.outputs.projects }}
      delivery-tag: ${{ steps.tag.outputs.delivery-tag }}
      short-sha: ${{ steps.tag.outputs.short-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for poly diff

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn', 'projects/*/deps.edn') }}

      - name: Detect affected projects
        id: detect
        run: |
          # Simulate poly diff - in real usage, use `poly diff` to detect changes
          # For now, detect based on changed files in the push
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          
          PROJECTS=()
          
          # Check if realworld-backend is affected
          if echo "$CHANGED_FILES" | grep -qE "(components/|bases/|projects/realworld-backend/)"; then
            PROJECTS+=("realworld-backend")
          fi
          
          # Check if realworld-frontend is affected
          if echo "$CHANGED_FILES" | grep -qE "(components/|projects/realworld-frontend/)"; then
            PROJECTS+=("realworld-frontend")
          fi
          
          # If nothing detected (e.g., first run), build all
          if [ ${#PROJECTS[@]} -eq 0 ]; then
            PROJECTS=("realworld-backend" "realworld-frontend")
          fi
          
          # Output as JSON array
          JSON=$(printf '%s\n' "${PROJECTS[@]}" | jq -R . | jq -s -c .)
          echo "projects=$JSON" >> "$GITHUB_OUTPUT"
          echo "::notice::Affected projects: $JSON"

      - name: Generate delivery tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DELIVERY_TAG="delivery-${SHORT_SHA}"
          echo "delivery-tag=$DELIVERY_TAG" >> "$GITHUB_OUTPUT"
          echo "short-sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build affected projects
        run: |
          PROJECTS='${{ steps.detect.outputs.projects }}'
          echo "Building projects: $PROJECTS"
          
          for project in $(echo "$PROJECTS" | jq -r '.[]'); do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Building: $project"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            mkdir -p "artifacts/$project"
            
            # Build uberjar for the project
            clojure -T:build uberjar :project "$project" 2>/dev/null || \
              echo "Build simulation - creating placeholder artifact"
            
            # Create artifact (real or simulated)
            if [ -f "projects/$project/target/*.jar" ]; then
              cp projects/$project/target/*.jar "artifacts/$project/"
            else
              echo "Simulated artifact for $project (sha: ${{ github.sha }})" > "artifacts/$project/artifact.jar"
            fi
            
            echo "✓ Built: $project"
          done

      - name: Generate manifest
        run: |
          PROJECTS='${{ steps.detect.outputs.projects }}'
          DELIVERY_TAG="${{ steps.tag.outputs.delivery-tag }}"
          SHORT_SHA="${{ steps.tag.outputs.short-sha }}"
          
          # Resolve Monday ID from the merged PR
          MONDAY_ID=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].head.ref' 2>/dev/null | grep -oE '^[A-Z]+-[A-Z][0-9]+' || echo "unknown")
          PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].number' 2>/dev/null || echo "")
          PR_URL=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].html_url' 2>/dev/null || echo "")
          
          # Build project entries
          PROJECT_ENTRIES=""
          for project in $(echo "$PROJECTS" | jq -r '.[]'); do
            ENTRY=$(jq -n \
              --arg name "$project" \
              --arg path "artifacts/${DELIVERY_TAG}/${project}/artifact.jar" \
              --arg runtime "clojure-jvm-21" \
              '{name: $name, artifactPath: $path, runtime: $runtime}')
            
            if [ -z "$PROJECT_ENTRIES" ]; then
              PROJECT_ENTRIES="$ENTRY"
            else
              PROJECT_ENTRIES="$PROJECT_ENTRIES,$ENTRY"
            fi
          done
          
          # Generate manifest
          jq -n \
            --arg version "1" \
            --arg deliveryTag "$DELIVERY_TAG" \
            --arg sha "${{ github.sha }}" \
            --arg mondayId "$MONDAY_ID" \
            --arg repo "${{ github.repository }}" \
            --arg createdAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg actor "${{ github.actor }}" \
            --arg runId "${{ github.run_id }}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg prNumber "$PR_NUMBER" \
            --arg prUrl "$PR_URL" \
            --argjson projects "[$PROJECT_ENTRIES]" \
            '{
              version: $version,
              deliveryTag: $deliveryTag,
              sha: $sha,
              mondayId: $mondayId,
              repo: $repo,
              createdAt: $createdAt,
              actor: $actor,
              projects: $projects,
              metadata: {
                pipelineRunId: $runId,
                pipelineRunUrl: $runUrl,
                prNumber: $prNumber,
                prUrl: $prUrl
              }
            }' > manifest.json
          
          echo "::group::Manifest"
          cat manifest.json | jq .
          echo "::endgroup::"

        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifacts (simulated S3)
        run: |
          DELIVERY_TAG="${{ steps.tag.outputs.delivery-tag }}"
          echo "::notice::Would upload to: s3://$ARTIFACT_BUCKET/$REPO_NAME/artifacts/$DELIVERY_TAG/"
          echo "::notice::Would upload manifest to: s3://$ARTIFACT_BUCKET/$REPO_NAME/manifests/$DELIVERY_TAG.json"
          
          # In real pipeline:
          # aws s3 cp --recursive artifacts/ s3://$ARTIFACT_BUCKET/$REPO_NAME/artifacts/$DELIVERY_TAG/
          # aws s3 cp manifest.json s3://$ARTIFACT_BUCKET/$REPO_NAME/manifests/$DELIVERY_TAG.json

      - name: Upload manifest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: manifest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Deploy to Beta (simulated)
  # ─────────────────────────────────────────────────────────────
  beta-deploy:
    runs-on: ubuntu-latest
    name: Beta Deploy
    needs: [build]
    steps:
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

      - name: Deploy to Beta
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEPLOYING TO BETA"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          PROJECTS=$(jq -r '.projects[].name' manifest.json)
          
          for project in $PROJECTS; do
            echo ""
            echo "🚀 Deploying $project to beta..."
            echo "   Artifact: artifacts/$project/artifact.jar"
            echo "   Target: beta-$project-lambda"
            echo "   ✓ Deployed (simulated)"
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Beta deployment complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────────────────
  # Stage 4: Beta Test (simulated)
  # ─────────────────────────────────────────────────────────────
  beta-test:
    runs-on: ubuntu-latest
    name: Beta Test
    needs: [beta-deploy]
    steps:
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest

      - name: Run Beta smoke tests
        run: |
          echo "Running smoke tests against beta..."
          PROJECTS=$(jq -r '.projects[].name' manifest.json)
          
          for project in $PROJECTS; do
            echo "  Testing $project... ✓ healthy"
          done
          
          echo "✅ All beta tests passed"

  # ─────────────────────────────────────────────────────────────
  # Stage 5: Delivery Tag + Draft GitHub Release
  # ─────────────────────────────────────────────────────────────
  delivery-tag:
    runs-on: ubuntu-latest
    name: Delivery Tag
    needs: [beta-test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest

      - name: Create delivery git tag
        run: |
          DELIVERY_TAG="${{ needs.build.outputs.delivery-tag }}"
          git tag "$DELIVERY_TAG"
          git push origin "$DELIVERY_TAG"
          echo "::notice::Created tag: $DELIVERY_TAG"

      - name: Create Draft GitHub Release
        run: |
          DELIVERY_TAG="${{ needs.build.outputs.delivery-tag }}"
          SHORT_SHA="${{ needs.build.outputs.short-sha }}"
          PROJECTS=$(jq -r '.projects[].name' manifest.json)
          MONDAY_ID=$(jq -r '.mondayId' manifest.json)
          CREATED_AT=$(jq -r '.createdAt' manifest.json)
          
          # Build release notes
          NOTES="## Delivery Manifest
          
          **Tag:** \`$DELIVERY_TAG\`
          **SHA:** \`${{ github.sha }}\`
          **Monday ID:** \`$MONDAY_ID\`
          **Created:** $CREATED_AT
          **Actor:** ${{ github.actor }}
          
          ### Projects Included
          $(for p in $PROJECTS; do echo "- \`$p\`"; done)
          
          ### Pipeline
          - Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          _This is a draft release. It will be published after successful production deployment._"
          
          gh release create "$DELIVERY_TAG" \
            --title "$DELIVERY_TAG" \
            --notes "$NOTES" \
            --draft \
            manifest.json
          
          echo "::notice::Created draft release: $DELIVERY_TAG"
        env:
          GH_TOKEN: ${{ github.token }}

  # ─────────────────────────────────────────────────────────────
  # Stage 6: Deploy to Production (simulated)
  # ─────────────────────────────────────────────────────────────
  production-deploy:
    runs-on: ubuntu-latest
    name: Production Deploy
    needs: [delivery-tag, build]
    steps:
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

      - name: Deploy to Production
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEPLOYING TO PRODUCTION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          PROJECTS=$(jq -r '.projects[].name' manifest.json)
          
          for project in $PROJECTS; do
            echo ""
            echo "🚀 Deploying $project to production..."
            echo "   Artifact: artifacts/$project/artifact.jar"
            echo "   Target: prod-$project-lambda"
            echo "   ✓ Deployed (simulated)"
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Production deployment complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────────────────
  # Stage 7: Production Test (simulated)
  # ─────────────────────────────────────────────────────────────
  production-test:
    runs-on: ubuntu-latest
    name: Production Test
    needs: [production-deploy]
    steps:
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest

      - name: Run Production smoke tests
        run: |
          echo "Running smoke tests against production..."
          PROJECTS=$(jq -r '.projects[].name' manifest.json)
          
          for project in $PROJECTS; do
            echo "  Testing $project... ✓ healthy"
          done
          
          echo "✅ All production tests passed"

  # ─────────────────────────────────────────────────────────────
  # Stage 8: Release Tag + Publish GitHub Release
  # ─────────────────────────────────────────────────────────────
  release-tag:
    runs-on: ubuntu-latest
    name: Release Tag
    needs: [production-test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest

      - name: Create release tag
        run: |
          VERSION="v$(date +%Y.%m.%d)-${{ github.run_number }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "::notice::Created release tag: $VERSION"

      - name: Publish GitHub Release (promote from draft)
        run: |
          DELIVERY_TAG="${{ needs.build.outputs.delivery-tag }}"
          VERSION="v$(date +%Y.%m.%d)-${{ github.run_number }}"
          PROJECTS=$(jq -r '.projects[].name' manifest.json)
          MONDAY_ID=$(jq -r '.mondayId' manifest.json)
          
          # Update release notes with production info
          NOTES="## Release $VERSION
          
          **Delivery Tag:** \`$DELIVERY_TAG\`
          **Release Tag:** \`$VERSION\`
          **SHA:** \`${{ github.sha }}\`
          **Monday ID:** \`$MONDAY_ID\`
          **Released:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Actor:** ${{ github.actor }}
          
          ### Projects Deployed
          $(for p in $PROJECTS; do echo "- ✅ \`$p\`"; done)
          
          ### Pipeline
          - Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          _Successfully deployed to production and all tests passed._"
          
          # Promote draft to published release
          gh release edit "$DELIVERY_TAG" \
            --draft=false \
            --title "$VERSION ($DELIVERY_TAG)" \
            --notes "$NOTES"
          
          echo "::notice::Published release: $VERSION"
        env:
          GH_TOKEN: ${{ github.token }}
