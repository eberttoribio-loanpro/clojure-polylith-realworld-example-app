name: Test PR Body Extraction
on:
  push:
    branches:
      - master

jobs:
  test-extraction:
    runs-on: ubuntu-latest
    name: Test PR Body from push event 2
    steps:
      - name: Test gh api with github.sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Push event context ==="
          echo "github.sha: ${{ github.sha }}"
          echo "github.ref: ${{ github.ref }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo ""
          echo "--- Raw API response (with errors visible) ---"
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls 2>&1 | jq '.[0] | {body: .body, head_ref: .head.ref, state: .state}' || echo "API CALL FAILED"
          echo ""
          echo "--- Extraction attempt ---"
          PR_BODY=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].body // empty' 2>/dev/null | tr -d '\r') || true
          echo "PR_BODY='$PR_BODY'"
          PR_PROJECTS=$(echo "$PR_BODY" | grep -o 'projects=[a-zA-Z0-9_,\-]*' | head -1 | sed 's/^projects=//' | tr ',' ' ') || true
          echo "PR_PROJECTS='$PR_PROJECTS'"
