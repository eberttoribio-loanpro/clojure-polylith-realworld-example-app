name: usermanager-example PR Pipeline
on:
  pull_request:
    branches:
      - develop
    paths-ignore:
      - "**/*.md"
      - docs/**
      - .kiro/**
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  affected-projects:
    runs-on: ubuntu-latest
    name: Detect Affected Projects
    outputs:
      projects: ${{ steps.affected.outputs.projects }}
      has-projects: ${{ steps.affected.outputs.has-projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Clojure CLI
        run: |
          echo "Installing Clojure..."
          curl -L -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo ./linux-install.sh
          rm linux-install.sh
          clojure --version
      - name: Install Polylith
        run: |
          echo "Installing Polylith..."
          POLY_VERSION="0.2.21"
          sudo mkdir -p /usr/local/polylith
          sudo curl -L "https://github.com/polyfy/polylith/releases/download/v${POLY_VERSION}/poly-${POLY_VERSION}.jar" -o /usr/local/polylith/poly.jar
          printf '#!/bin/sh\nARGS=""\nwhile [ "$1" != "" ] ; do\n  ARGS="$ARGS $1"\n  shift\ndone\nexec java $JVM_OPTS -jar /usr/local/polylith/poly.jar $ARGS\n' | sudo tee /usr/local/bin/poly > /dev/null
          sudo chmod +x /usr/local/bin/poly
          poly version
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |-
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clj-
      - name: Get affected projects
        id: affected
        run: |
          PROJECTS=$(clojure -M:poly ws get:changes:changed-or-affected-projects since:release skip:dev)
          echo "Raw output: $PROJECTS"
          # Convert space/newline-separated list to JSON array
          JSON=$(echo "$PROJECTS" | tr -s '[:space:]' '\n' | sed '/^$/d' | jq -R . | jq -s .)
          echo "projects=$JSON" >> $GITHUB_OUTPUT
          if [ "$JSON" = "[]" ]; then
            echo "has-projects=false" >> $GITHUB_OUTPUT
          else
            echo "has-projects=true" >> $GITHUB_OUTPUT
          fi
          echo "Affected projects: $JSON"

  early-test:
    runs-on: ubuntu-latest
    name: "Early Test (${{ matrix.project }})"
    needs:
      - affected-projects
    if: needs.affected-projects.outputs.has-projects == 'true'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.affected-projects.outputs.projects) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Clojure CLI
        run: |
          echo "Installing Clojure..."
          curl -L -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo ./linux-install.sh
          rm linux-install.sh
          clojure --version
      - name: Install Polylith
        run: |
          echo "Installing Polylith..."
          POLY_VERSION="0.2.21"
          sudo mkdir -p /usr/local/polylith
          sudo curl -L "https://github.com/polyfy/polylith/releases/download/v${POLY_VERSION}/poly-${POLY_VERSION}.jar" -o /usr/local/polylith/poly.jar
          printf '#!/bin/sh\nARGS=""\nwhile [ "$1" != "" ] ; do\n  ARGS="$ARGS $1"\n  shift\ndone\nexec java $JVM_OPTS -jar /usr/local/polylith/poly.jar $ARGS\n' | sudo tee /usr/local/bin/poly > /dev/null
          sudo chmod +x /usr/local/bin/poly
          poly version
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |-
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}-${{ matrix.project }}
          restore-keys: |
            ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}-
            ${{ runner.os }}-clj-
      - name: "Run tests for ${{ matrix.project }}"
        run: clojure -M:poly test project:${{ matrix.project }}