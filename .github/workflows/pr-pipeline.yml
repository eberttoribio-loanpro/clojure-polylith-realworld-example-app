name: usermanager-example PR Pipeline
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - docs/**
      - .kiro/**
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  affected-projects:
    runs-on: ubuntu-latest
    name: Detect Affected Projects
    outputs:
      projects: ${{ steps.affected.outputs.projects }}
      has-projects: ${{ steps.affected.outputs.has-projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      - uses: eberttoribio-loanpro/github-actions/setup-clojure@main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      - uses: eberttoribio-loanpro/github-actions/setup-polylith@main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |-
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clj-
      - name: Get affected projects
        id: affected
        run: |
          RAW=$(poly ws get:changes:changed-or-affected-projects since:release skip:dev color-mode:none)
          echo "Raw output: $RAW"
          # Strip EDN vector brackets and quotes, get clean project names
          CLEAN=$(echo "$RAW" | tr -d '[]"' | tr -d '\n' | xargs)
          echo "Clean output: $CLEAN"
          if [ -z "$CLEAN" ]; then
            echo "projects=[]" >> $GITHUB_OUTPUT
            echo "has-projects=false" >> $GITHUB_OUTPUT
            echo "No affected projects found."
          else
            # Convert space-separated names to JSON array (compact, single line)
            JSON=$(echo "$CLEAN" | tr ' ' '\n' | jq -R . | jq -sc .)
            echo "projects=$JSON" >> $GITHUB_OUTPUT
            echo "has-projects=true" >> $GITHUB_OUTPUT
            echo "Affected projects: $JSON"
          fi

  early-test:
    runs-on: ubuntu-latest
    name: "Early Test (${{ matrix.project }})"
    needs:
      - affected-projects
    if: needs.affected-projects.outputs.has-projects == 'true'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.affected-projects.outputs.projects) }}
    steps:
      - uses: actions/checkout@v4
      - uses: eberttoribio-loanpro/github-actions/setup-clojure@main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      - uses: eberttoribio-loanpro/github-actions/setup-polylith@main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |-
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}-${{ matrix.project }}
          restore-keys: |
            ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}-
            ${{ runner.os }}-clj-
      - name: "Run tests for ${{ matrix.project }}"
        run: clojure -M:poly test project:${{ matrix.project }}