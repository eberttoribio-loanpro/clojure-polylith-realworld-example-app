name: green-microservices PR Pipeline
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - docs/**
      - .kiro/**
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pre-early-test:
    runs-on: ubuntu-latest
    name: Detect Affected Projects
    outputs:
      projects: ${{ steps.affected.outputs.projects }}
      has-projects: ${{ steps.affected.outputs.has-projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      - name: Install Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12.1
        with:
          cli: latest
      - name: Install Polylith
        run: |-
          echo "Installing Polylith..."
          POLY_VERSION="0.2.21"
          sudo mkdir -p /usr/local/polylith
          sudo curl -L "https://github.com/polyfy/polylith/releases/download/v${POLY_VERSION}/poly-${POLY_VERSION}.jar" -o /usr/local/polylith/poly.jar
          printf '#!/bin/sh\nARGS=""\nwhile [ "$1" != "" ] ; do\n  ARGS="$ARGS $1"\n  shift\ndone\nexec java $JVM_OPTS -jar /usr/local/polylith/poly.jar $ARGS\n' | sudo tee /usr/local/bin/poly > /dev/null
          sudo chmod +x /usr/local/bin/poly
          poly version
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |-
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clj-
      - id: affected
        name: Get affected projects
        run: |-
          RAW=$(poly ws get:changes:changed-or-affected-projects since:release skip:dev color-mode:none)
          echo "Raw output: $RAW"
          CLEAN=$(echo "$RAW" | tr -d '[]"' | tr -d '\n' | xargs)
          echo "Clean output: $CLEAN"
          if [ -z "$CLEAN" ]; then
            echo "projects=[]" >> $GITHUB_OUTPUT
            echo "has-projects=false" >> $GITHUB_OUTPUT
            echo "No affected projects found."
          else
            JSON=$(echo "$CLEAN" | tr ' ' '\n' | jq -R . | jq -sc .)
            echo "projects=$JSON" >> $GITHUB_OUTPUT
            echo "has-projects=true" >> $GITHUB_OUTPUT
            echo "Affected projects: $JSON"
          fi
  early-test:
    runs-on: ubuntu-latest
    name: Early Test (${{ matrix.project }})
    if: needs.pre-early-test.outputs.has-projects == 'true'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.pre-early-test.outputs.projects) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12.1
        with:
          cli: latest
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |-
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}-${{ matrix.project }}
          restore-keys: |-
            ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}-
            ${{ runner.os }}-clj-
      - name: Run tests for ${{ matrix.project }}
        run: clojure -M:poly test project:${{ matrix.project }}
    needs:
      - pre-early-test
